<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="A quiet dream journal. Record your dreams with voice.">
  <meta name="theme-color" content="#060D18">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nocturne">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <title>Nocturne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Inline splash canvas styles — critical for first paint */
    #splashCanvas {
      position: fixed; inset: 0; z-index: 500;
      background: #060D18;
    }
    #splashCanvas.hide {
      opacity: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <a href="#mainView" class="skip-link">跳到主内容</a>
    <div class="light-pools"></div>
    <canvas id="particles" aria-hidden="true" role="presentation"></canvas>
    <main id="mainView"></main>
    <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="主导航">
      <a href="#timeline" class="nav-tab" data-route="timeline">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>时间线</span>
      </a>
      <a href="#record" class="nav-tab nav-tab--center" data-route="record">
        <div class="nav-record-btn">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg>
        </div>
        <span>记录</span>
      </a>
      <a href="#broadcast" class="nav-tab" data-route="broadcast">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="4" ry="9"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        <span>广播</span>
      </a>
    </nav>
  </div>

  <!-- Splash Canvas -->
  <canvas id="splashCanvas"></canvas>

  <div id="toast" class="toast" hidden aria-live="polite" role="status"></div>

  <script src="i18n.js"></script>
  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
