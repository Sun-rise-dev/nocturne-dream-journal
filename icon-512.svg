<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Night sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020510"/>
      <stop offset="45%" stop-color="#050C1E"/>
      <stop offset="100%" stop-color="#0A1528"/>
    </linearGradient>

    <!-- Moon body gradient — warm gold -->
    <radialGradient id="moonFace" cx="38%" cy="35%">
      <stop offset="0%" stop-color="#F8F0E0"/>
      <stop offset="30%" stop-color="#ECE0C8"/>
      <stop offset="65%" stop-color="#D8C8A0"/>
      <stop offset="100%" stop-color="#C4A870"/>
    </radialGradient>

    <!-- Moon halo — soft warm glow -->
    <radialGradient id="moonHalo" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(230,215,180,0.22)"/>
      <stop offset="35%" stop-color="rgba(220,205,170,0.10)"/>
      <stop offset="65%" stop-color="rgba(200,185,150,0.03)"/>
      <stop offset="100%" stop-color="rgba(200,185,150,0)"/>
    </radialGradient>

    <!-- Water reflection gradient -->
    <linearGradient id="waterReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(220,200,160,0.55)"/>
      <stop offset="25%" stop-color="rgba(200,180,140,0.30)"/>
      <stop offset="60%" stop-color="rgba(180,160,120,0.10)"/>
      <stop offset="100%" stop-color="rgba(160,140,100,0)"/>
    </linearGradient>

    <!-- Star glow filter -->
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Moon soft glow filter -->
    <filter id="moonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- iOS rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>

  <!-- ═══════════════════ BACKGROUND STARS (tiny dust) ═══════════════════ -->
  <g opacity="0.30">
    <circle cx="75" cy="60" r="1.4" fill="#D8CCB0"/>
    <circle cx="420" cy="45" r="1.1" fill="#C8BCA0"/>
    <circle cx="460" cy="130" r="1.3" fill="#DDD0B8"/>
    <circle cx="380" cy="185" r="1.0" fill="#C4B898"/>
    <circle cx="55" cy="170" r="1.2" fill="#D0C4A8"/>
    <circle cx="145" cy="38" r="1.0" fill="#CCC0A4"/>
    <circle cx="320" cy="55" r="1.3" fill="#D8CCB0"/>
    <circle cx="90" cy="270" r="0.9" fill="#C0B490"/>
    <circle cx="430" cy="250" r="1.1" fill="#CCC0A4"/>
    <circle cx="480" cy="300" r="1.0" fill="#C8BCA0"/>
  </g>

  <!-- ═══════════════════ STAR 1: Large upper-right (primary accent) ═══════════════════ -->
  <g transform="translate(368, 88)" filter="url(#starGlow)">
    <!-- Cross spikes -->
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#F5EDDF" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#F5EDDF" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Diagonal spikes -->
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#E8DCC8" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#E8DCC8" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Core -->
    <circle cx="0" cy="0" r="3.2" fill="#F8F0E0"/>
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="6" fill="rgba(245,237,223,0.12)"/>
  </g>

  <!-- ═══════════════════ STAR 2: Medium upper-left ═══════════════════ -->
  <g transform="translate(115, 102)" filter="url(#starGlow)" opacity="0.70">
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#F0E5D0" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#F0E5D0" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.0" fill="#F5EDDF"/>
    <circle cx="0" cy="0" r="4" fill="rgba(240,229,208,0.10)"/>
  </g>

  <!-- ═══════════════════ STAR 3: Small near moon ═══════════════════ -->
  <g transform="translate(310, 145)" filter="url(#starGlow)" opacity="0.55">
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#EBE0CC" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#EBE0CC" stroke-width="0.7" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.4" fill="#F0E5D0"/>
  </g>

  <!-- ═══════════════════ MOON HALO ═══════════════════ -->
  <circle cx="256" cy="215" r="155" fill="url(#moonHalo)"/>

  <!-- Subtle orbital ring -->
  <circle cx="256" cy="215" r="118" fill="none" stroke="rgba(220,205,170,0.05)" stroke-width="0.6"/>

  <!-- ═══════════════════ CRESCENT MOON ═══════════════════ -->
  <!-- Hand-drawn crescent using bezier curves — organic, elegant -->
  <g filter="url(#moonGlow)">
    <path d="
      M 256 120
      C 310 120, 355 150, 370 195
      C 380 225, 378 255, 362 278
      C 340 310, 300 328, 256 328
      C 230 328, 208 320, 192 305
      C 216 295, 238 278, 254 254
      C 270 230, 278 200, 274 170
      C 270 144, 264 130, 256 120
      Z
    " fill="url(#moonFace)"/>
  </g>

  <!-- Moon inner highlight — subtle arc of lighter gold -->
  <path d="
    M 262 148
    C 296 148, 322 168, 335 195
    C 330 170, 310 154, 282 148
    C 272 146, 265 147, 262 148
    Z
  " fill="rgba(255,248,235,0.15)"/>

  <!-- ═══════════════════ WATER SURFACE LINE ═══════════════════ -->
  <!-- Subtle horizon shimmer -->
  <line x1="60" y1="335" x2="452" y2="335" stroke="rgba(210,190,155,0.12)" stroke-width="0.8"/>
  <line x1="100" y1="337" x2="412" y2="337" stroke="rgba(200,180,145,0.08)" stroke-width="0.5"/>

  <!-- ═══════════════════ MOON REFLECTION IN WATER ═══════════════════ -->
  <!-- Reflection: elongated, fragmented by ripples, fading downward -->
  <g opacity="0.55">
    <!-- Ripple 1 — brightest, close to surface -->
    <ellipse cx="256" cy="352" rx="42" ry="6" fill="rgba(220,200,160,0.30)"/>
    <!-- Ripple 2 -->
    <ellipse cx="258" cy="370" rx="38" ry="5" fill="rgba(210,190,150,0.22)"/>
    <!-- Ripple 3 -->
    <ellipse cx="254" cy="388" rx="32" ry="4" fill="rgba(200,180,140,0.15)"/>
    <!-- Ripple 4 -->
    <ellipse cx="260" cy="404" rx="26" ry="3.5" fill="rgba(190,170,130,0.10)"/>
    <!-- Ripple 5 -->
    <ellipse cx="252" cy="418" rx="20" ry="2.5" fill="rgba(180,160,120,0.06)"/>
    <!-- Ripple 6 — faintest -->
    <ellipse cx="258" cy="430" rx="14" ry="2" fill="rgba(170,150,110,0.04)"/>
  </g>

  <!-- Vertical shimmer lines in reflection -->
  <g opacity="0.18">
    <line x1="240" y1="345" x2="238" y2="415" stroke="#E8DCC8" stroke-width="0.6"/>
    <line x1="256" y1="340" x2="257" y2="425" stroke="#E8DCC8" stroke-width="0.5"/>
    <line x1="272" y1="346" x2="274" y2="410" stroke="#DDD0B8" stroke-width="0.5"/>
    <line x1="248" y1="344" x2="246" y2="395" stroke="#D8C8A8" stroke-width="0.4"/>
    <line x1="264" y1="343" x2="265" y2="405" stroke="#D8C8A8" stroke-width="0.4"/>
  </g>

  <!-- Horizontal ripple lines across the water -->
  <g opacity="0.10">
    <line x1="110" y1="360" x2="400" y2="360" stroke="#D4C4A0" stroke-width="0.4"/>
    <line x1="130" y1="385" x2="380" y2="385" stroke="#C8B898" stroke-width="0.3"/>
    <line x1="150" y1="410" x2="360" y2="410" stroke="#C0B090" stroke-width="0.3"/>
    <line x1="170" y1="435" x2="340" y2="435" stroke="#B8A888" stroke-width="0.2"/>
  </g>
</svg>
