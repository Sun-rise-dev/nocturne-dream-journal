<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030711"/>
      <stop offset="60%" stop-color="#060D18"/>
      <stop offset="100%" stop-color="#091224"/>
    </linearGradient>

    <!-- Moon body gradient -->
    <radialGradient id="moonFace" cx="42%" cy="38%">
      <stop offset="0%" stop-color="#F5EDDF"/>
      <stop offset="35%" stop-color="#E8DCC8"/>
      <stop offset="70%" stop-color="#D4C4A0"/>
      <stop offset="100%" stop-color="#BFA578"/>
    </radialGradient>

    <!-- Outer halo -->
    <radialGradient id="halo" cx="50%" cy="44%">
      <stop offset="0%" stop-color="rgba(220,205,170,0.18)"/>
      <stop offset="30%" stop-color="rgba(220,205,170,0.08)"/>
      <stop offset="60%" stop-color="rgba(220,205,170,0.02)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Water reflection gradient -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(220,205,170,0.4)"/>
      <stop offset="100%" stop-color="rgba(220,205,170,0)"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded rect (iOS icon shape) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Very subtle texture — tiny stars -->
  <g opacity="0.35">
    <circle cx="98" cy="72" r="1.8" fill="#E8DCC8"/>
    <circle cx="410" cy="88" r="1.5" fill="#D4C4A0"/>
    <circle cx="440" cy="160" r="1.2" fill="#C8C0B8"/>
    <circle cx="72" cy="195" r="1.4" fill="#E0D5C0"/>
    <circle cx="120" cy="380" r="1.6" fill="#D4C4A0"/>
    <circle cx="400" cy="370" r="1.3" fill="#C8C0B8"/>
    <circle cx="350" cy="440" r="1.5" fill="#E8DCC8"/>
    <circle cx="155" cy="430" r="1.2" fill="#D4C4A0"/>
    <circle cx="85" cy="290" r="1.1" fill="#C8C0B8"/>
    <circle cx="430" cy="280" r="1.4" fill="#E8DCC8"/>
    <circle cx="300" cy="62" r="1.3" fill="#D4C4A0"/>
    <circle cx="200" cy="460" r="1.5" fill="#E0D5C0"/>
  </g>

  <!-- Sparkle stars (cross-shaped) -->
  <g transform="translate(380, 115)" opacity="0.55">
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#F0E5D0" stroke-width="0.7"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#F0E5D0" stroke-width="0.7"/>
    <circle cx="0" cy="0" r="1.8" fill="#F5EDDF"/>
  </g>
  <g transform="translate(105, 140)" opacity="0.4">
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#F0E5D0" stroke-width="0.6"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#F0E5D0" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="1.3" fill="#F5EDDF"/>
  </g>
  <g transform="translate(420, 330)" opacity="0.3">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#F0E5D0" stroke-width="0.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#F0E5D0" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="1.1" fill="#F5EDDF"/>
  </g>

  <!-- Grand halo -->
  <circle cx="256" cy="210" r="220" fill="url(#halo)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="210" r="145" fill="none" stroke="rgba(220,205,170,0.06)" stroke-width="0.8"/>
  <circle cx="256" cy="210" r="185" fill="none" stroke="rgba(220,205,170,0.03)" stroke-width="0.5"/>

  <!-- Moon crescent — main body -->
  <g filter="url(#softGlow)">
    <circle cx="256" cy="210" r="95" fill="url(#moonFace)"/>
  </g>

  <!-- Crescent cutout — creates the crescent shape -->
  <circle cx="304" cy="174" r="80" fill="#030711"/>

  <!-- Inner shadow on crescent for depth -->
  <ellipse cx="218" cy="178" rx="20" ry="36" fill="rgba(255,255,255,0.07)" transform="rotate(-24,218,178)"/>
  <ellipse cx="218" cy="178" rx="10" ry="20" fill="rgba(0,0,0,0.04)" transform="rotate(-24,218,178)"/>

  <!-- Water reflection line at bottom -->
  <g opacity="0.25">
    <ellipse cx="256" cy="380" rx="120" ry="2" fill="none" stroke="#E8DCC8" stroke-width="0.5"/>
    <ellipse cx="256" cy="392" rx="85" ry="1.5" fill="none" stroke="#D4C4A0" stroke-width="0.4"/>
    <ellipse cx="256" cy="402" rx="55" ry="1" fill="none" stroke="#C8C0B8" stroke-width="0.3"/>
  </g>
</svg>